<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Designer — controlp.io</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Geist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { font-family: 'Inter', system-ui, sans-serif; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; margin: 0; }

  /* Tool rail */
  .tool-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 9px 4px; border-radius: 7px; cursor: pointer; width: 100%;
    font-size: 9px; font-weight: 500; color: #71717a; line-height: 1.2;
    text-align: center; transition: all 0.12s; border: none; background: none;
  }
  .tool-btn:hover { background: #f4f4f5; color: #18181b; }
  .tool-btn.active { background: #18181b; color: white; }
  .tool-btn svg { width: 19px; height: 19px; stroke-width: 1.8; stroke: currentColor; fill: none; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* Panel */
  .panel-tab { font-size: 12.5px; padding: 8px 14px; border-bottom: 2px solid transparent; color: #71717a; cursor: pointer; background: none; border-top: none; border-left: none; border-right: none; transition: all 0.12s; }
  .panel-tab.active { color: #18181b; border-bottom-color: #18181b; font-weight: 600; }

  /* Color swatches */
  .swatch { width: 20px; height: 20px; border-radius: 4px; cursor: pointer; border: 1.5px solid rgba(0,0,0,0.08); transition: transform 0.1s; flex-shrink: 0; }
  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { outline: 2px solid #3b82f6; outline-offset: 1px; }

  /* Slider */
  .range-wrap { position: relative; height: 6px; border-radius: 3px; background: #e4e4e7; }
  .range-fill { height: 100%; border-radius: 3px; background: #18181b; }
  .range-thumb { position: absolute; right: 0; top: -5px; width: 16px; height: 16px; background: white; border: 2px solid #18181b; border-radius: 50%; }

  /* Layer row */
  .layer-row { display: flex; align-items: center; gap: 7px; padding: 8px 10px; border-bottom: 1px solid #f4f4f5; cursor: pointer; transition: background 0.1s; }
  .layer-row:hover { background: #f9f9f9; }
  .layer-row.selected { background: #eff6ff; }
  .layer-icon-btn { padding: 4px; border-radius: 4px; border: none; background: none; cursor: pointer; color: #a1a1aa; transition: all 0.1s; display: flex; align-items: center; justify-content: center; }
  .layer-icon-btn:hover { background: #f4f4f5; color: #52525b; }
  .layer-icon-btn.danger:hover { background: #fef2f2; color: #ef4444; }

  /* Upload zone */
  .upload-zone { border: 2px dashed #d4d4d8; border-radius: 8px; padding: 20px 12px; text-align: center; background: #fafafa; transition: all 0.15s; cursor: pointer; }
  .upload-zone:hover { border-color: #3b82f6; background: #eff6ff; }

  /* Design thumbnail */
  .design-card { border: 1.5px solid #e4e4e7; border-radius: 7px; padding: 8px 4px; cursor: pointer; transition: all 0.12s; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 72px; background: white; }
  .design-card:hover { border-color: #3b82f6; background: #eff6ff; }
  .design-card.selected { border-color: #2563eb; background: #eff6ff; }

  /* Product thumbnail */
  .product-card { border: 2px solid #e4e4e7; border-radius: 8px; cursor: pointer; transition: all 0.12s; background: #f4f5f7; display: flex; align-items: center; justify-content: center; height: 88px; }
  .product-card:hover { border-color: #93c5fd; }
  .product-card.selected { border-color: #2563eb; background: #eff6ff; }

  /* Canvas ruler ticks */
  .ruler-h, .ruler-v { position: absolute; background: white; border: none; }
  .ruler-h { top: 0; left: 20px; right: 0; height: 20px; border-bottom: 1px solid #d4d4d8; display: flex; align-items: flex-end; }
  .ruler-v { left: 0; top: 20px; bottom: 0; width: 20px; border-right: 1px solid #d4d4d8; }

  /* Selection handles */
  .handle { position: absolute; width: 8px; height: 8px; background: white; border: 1.5px solid #2563eb; border-radius: 1.5px; }

  /* Scrollbar thin */
  .thin-scroll::-webkit-scrollbar { width: 4px; }
  .thin-scroll::-webkit-scrollbar-track { background: transparent; }
  .thin-scroll::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 2px; }

  /* Canvas grid background */
  .canvas-bg {
    background-color: #e8e8e8;
    background-image: linear-gradient(45deg, #d8d8d8 25%, transparent 25%),
      linear-gradient(-45deg, #d8d8d8 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #d8d8d8 75%),
      linear-gradient(-45deg, transparent 75%, #d8d8d8 75%);
    background-size: 12px 12px;
    background-position: 0 0, 0 6px, 6px -6px, -6px 0px;
  }

  /* Top toolbar button */
  .tb-btn { display: flex; align-items: center; gap: 6px; padding: 5px 10px; border-radius: 5px; font-size: 12px; color: #e4e4e7; background: none; border: none; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
  .tb-btn:hover { background: rgba(255,255,255,0.1); }
  .tb-btn:disabled { opacity: 0.3; cursor: default; }
  .tb-btn:disabled:hover { background: none; }

  .price-badge { font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.15); padding: 2px 7px; border-radius: 99px; margin-left: 2px; }
</style>
</head>
<body>

<!-- ═══════════════════════════════════════════════ TOP TOOLBAR -->
<div id="toolbar" style="height:48px; background:#18181b; border-bottom:1px solid #3f3f46; display:flex; align-items:center; justify-content:space-between; padding:0 10px; user-select:none;">
  <!-- Left -->
  <div style="display:flex; align-items:center; gap:2px;">
    <button class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download
    </button>
    <button class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      Preview
    </button>
    <button class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print
    </button>
  </div>

  <!-- Center undo/redo -->
  <div style="display:flex; align-items:center; gap:4px;">
    <button id="btn-undo" class="tb-btn" disabled title="Undo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg>
    </button>
    <button id="btn-redo" class="tb-btn" disabled title="Redo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/></svg>
    </button>
  </div>

  <!-- Right -->
  <div style="display:flex; align-items:center; gap:4px;">
    <button id="btn-ruler" onclick="toggleRuler()" class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.3 8.7l-8.6 8.6a1 1 0 01-1.4 0l-5.6-5.6a1 1 0 010-1.4l8.6-8.6a1 1 0 011.4 0l5.6 5.6a1 1 0 010 1.4z"/><path d="M7.5 12.5l1.4 1.4"/><path d="M10.5 9.5l1.4 1.4"/><path d="M13.5 6.5l1.4 1.4"/></svg>
      Toggle Ruler
    </button>
    <button class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
      Zoom
    </button>
    <button class="tb-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Info
    </button>
    <button onclick="handleDone()" style="display:flex; align-items:center; gap:6px; padding:6px 14px; border-radius:6px; font-size:12.5px; font-weight:600; background:#16a34a; color:white; border:none; cursor:pointer; transition:background 0.12s; margin-left:6px;">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      Done
      <span class="price-badge" id="price-label">$30.00</span>
    </button>
    <a href="product.html" style="display:flex; align-items:center; padding:6px; border-radius:5px; color:#a1a1aa; transition:all 0.12s; margin-left:2px;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='none'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </a>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ MAIN BODY -->
<div style="display:flex; height:calc(100vh - 48px);">

  <!-- ─── TOOL RAIL ─── -->
  <div style="width:56px; background:white; border-right:1px solid #e4e4e7; display:flex; flex-direction:column; align-items:center; padding:6px 4px; gap:2px; flex-shrink:0; overflow-y:auto;" class="thin-scroll">
    <button onclick="setTool('swap')" id="tool-swap" class="tool-btn active" title="Swap Product">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Swap Product
    </button>
    <button onclick="setTool('image')" id="tool-image" class="tool-btn" title="Add Image">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2.5"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      Add Image
    </button>
    <button onclick="setTool('designs')" id="tool-designs" class="tool-btn" title="Choose From Designs">
      <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Choose From Designs
    </button>
    <button onclick="setTool('text')" id="tool-text" class="tool-btn" title="Add Text">
      <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      Add Text
    </button>
    <button onclick="setTool('layers')" id="tool-layers" class="tool-btn" title="Manage Layers">
      <svg viewBox="0 0 24 24"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>
      Manage Layers
    </button>
    <button onclick="setTool('saved')" id="tool-saved" class="tool-btn" title="Saved Designs">
      <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Saved Designs
    </button>
  </div>

  <!-- ─── CONTEXT PANEL ─── -->
  <div id="tool-panel" style="width:222px; background:white; border-right:1px solid #e4e4e7; overflow-y:auto; flex-shrink:0;" class="thin-scroll">
    <!-- Rendered by JS -->
  </div>

  <!-- ─── CANVAS AREA ─── -->
  <div id="canvas-area" class="canvas-bg" style="flex:1; position:relative; display:flex; align-items:center; justify-content:center; overflow:hidden;">

    <!-- Rulers (hidden by default) -->
    <div id="ruler-h" style="display:none; position:absolute; top:0; left:20px; right:0; height:20px; background:white; border-bottom:1px solid #d4d4d8; z-index:5; overflow:hidden;">
      <svg width="100%" height="20"><g id="ruler-h-ticks" fill="#a1a1aa" font-size="8" font-family="monospace"></g></svg>
    </div>
    <div id="ruler-v" style="display:none; position:absolute; top:20px; left:0; width:20px; bottom:0; background:white; border-right:1px solid #d4d4d8; z-index:5; overflow:hidden;">
      <svg height="100%" width="20"><g id="ruler-v-ticks" fill="#a1a1aa" font-size="8" font-family="monospace"></g></svg>
    </div>

    <!-- White design canvas -->
    <div style="position:relative; background:white; border-radius:3px; box-shadow:0 4px 24px rgba(0,0,0,0.16);" id="design-canvas" onclick="canvasClick(event)">

      <!-- Product SVG -->
      <svg id="product-svg" viewBox="0 0 160 280" style="display:block;">
        <!-- Case drop shadow -->
        <rect x="11" y="13" width="140" height="258" rx="22" fill="rgba(0,0,0,0.12)"/>
        <!-- Case body -->
        <rect x="8" y="8" width="144" height="264" rx="20" fill="#dde3ea" stroke="#b8c4ce" stroke-width="1.5"/>
        <!-- Inner shell -->
        <rect x="13" y="13" width="134" height="254" rx="17" fill="#eceff3"/>
        <!-- Camera module -->
        <rect x="16" y="16" width="58" height="28" rx="9" fill="#222"/>
        <circle cx="30" cy="30" r="9.5" fill="#111"/>
        <circle cx="30" cy="30" r="7" fill="#1a1a1a"/>
        <circle cx="30" cy="30" r="4.5" fill="#2a2a2a"/>
        <circle cx="28" cy="28" r="1.5" fill="rgba(255,255,255,0.35)"/>
        <circle cx="48" cy="30" r="6" fill="#111"/>
        <circle cx="48" cy="30" r="3.5" fill="#5a5a3a"/>
        <rect x="60" y="23" width="10" height="10" rx="2.5" fill="#222"/>
        <rect x="62" y="25" width="6" height="6" rx="1.5" fill="#4a4a2a"/>
        <!-- Print zone (the white printable area) -->
        <rect id="print-zone" x="16" y="52" width="128" height="204" rx="6" fill="white"/>
        <!-- Design group (populated by JS) -->
        <g id="canvas-design"></g>
        <!-- Selection handles group -->
        <g id="selection-group" opacity="0">
          <rect id="sel-rect" x="20" y="60" width="120" height="180" fill="none" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4 3" rx="2"/>
          <rect x="16" y="56" width="8" height="8" rx="1.5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
          <rect x="136" y="56" width="8" height="8" rx="1.5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
          <rect x="16" y="236" width="8" height="8" rx="1.5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
          <rect x="136" y="236" width="8" height="8" rx="1.5" fill="white" stroke="#2563eb" stroke-width="1.5"/>
          <!-- Size label -->
          <rect x="55" y="58" width="50" height="14" rx="3" fill="#18181b"/>
          <text x="80" y="68" text-anchor="middle" font-size="8" fill="white" font-family="monospace" id="sel-size-label">120×180mm</text>
          <!-- Rotate handle -->
          <circle id="sel-rotate" cx="80" cy="250" r="6" fill="white" stroke="#2563eb" stroke-width="1.5" cursor="grab"/>
          <path d="M76 250 a4 4 0 0 1 8 0" fill="none" stroke="#2563eb" stroke-width="1.5"/>
        </g>
      </svg>
    </div>

  </div>
</div>

<!-- ═══════════════════════════════════════════════ JS -->
<script>
// ─── State ───
let currentTool = 'swap';
let layers = [];
let rulerVisible = false;
let selectedLayer = -1;
let textColor = '#18181b';
let designColor = '#0034d2';
let currentDesign = null;

// ─── Panel templates ───
function renderSwap() {
  return `
    <div style="padding:10px; border-bottom:1px solid #f0f0f0;">
      <div style="font-size:10px; font-weight:600; color:#a1a1aa; text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px;">Category</div>
      <select onchange="filterProducts(this.value)" style="width:100%; font-size:12.5px; border:1px solid #e4e4e7; border-radius:6px; padding:6px 10px; outline:none; background:white;">
        <option>Apple</option><option>Samsung</option><option>Google Pixel</option><option>OnePlus</option><option>Moto</option>
      </select>
    </div>
    <div id="product-grid" style="padding:8px; overflow-y:auto; max-height:calc(100vh - 120px);" class="thin-scroll">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:6px;">
        ${Array(14).fill(0).map((_, i) => `
          <div onclick="selectProduct(this, ${i})" class="product-card${i === 0 ? ' selected' : ''}" title="iPhone Model ${i + 12}">
            <svg viewBox="0 0 60 100" width="42" height="70">
              <rect x="3" y="3" width="54" height="94" rx="10" fill="#c8d0da" stroke="#aab4be" stroke-width="1"/>
              <rect x="6" y="6" width="48" height="88" rx="8" fill="#dde3ea"/>
              <rect x="9" y="9" width="24" height="14" rx="5" fill="#222"/>
              <circle cx="15" cy="16" r="5" fill="#111"/><circle cx="15" cy="16" r="3" fill="#222"/>
              <circle cx="25" cy="16" r="3.5" fill="#111"/>
              ${i >= 8 ? '<rect x="9" y="9" width="5" height="14" rx="2" fill="#111"/>' : ''}
            </svg>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderImage() {
  return `
    <div style="padding:8px 10px 6px; border-bottom:1px solid #f0f0f0;">
      <div style="font-size:10px; font-weight:600; color:#a1a1aa; text-transform:uppercase; letter-spacing:.05em; margin-bottom:8px;">Import from</div>
      <div style="display:flex; align-items:center; gap:2px; justify-content:center;">
        ${[
          ['#3b82f6', 'M5 17.3V19h1.7l5-5-1.7-1.7-5 5zm8-11.6l1.7 1.7-1.2 1.2-1.7-1.7 1.2-1.2zm.7-2.1l2.7 2.7a.6.6 0 010 .84l-8.3 8.3H6v-2.7l8.3-8.3a.6.6 0 01.84 0z', 'Upload'],
          ['#1877f2', 'M18 2h-3a5 5 0 00-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 011-1h3z', 'Facebook'],
          ['#e1306c', 'M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z M17.5 6.5h.01 M2 7a5 5 0 015-5h10a5 5 0 015 5v10a5 5 0 01-5 5H7a5 5 0 01-5-5z', 'Instagram'],
          ['#71717a', 'M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z M12 17a4 4 0 100-8 4 4 0 000 8z', 'Camera'],
          ['#8b5cf6', 'M21 2H3v16h5v4l4-4h9V2zm-8 9H8V9h5v2zm3-4H8V5h8v2z', 'More'],
        ].map(([c, d, t]) => `
          <button title="${t}" style="padding:7px; border-radius:6px; border:none; background:none; cursor:pointer; transition:background 0.1s;" onmouseover="this.style.background='#f4f4f5'" onmouseout="this.style.background='none'">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">${d.split(' M').map((p,i)=> i===0 ? `<path d="${p}"/>` : `<path d="M${p}"/>`).join('')}</svg>
          </button>
        `).join('')}
      </div>
    </div>
    <div style="padding:12px;">
      <div class="upload-zone" onclick="simulateUpload()">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#a1a1aa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 8px;display:block;"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <div style="font-size:10.5px; font-weight:700; color:#71717a; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px;">Click or drop images here</div>
        <div style="display:inline-block; background:#2563eb; color:white; font-size:11.5px; font-weight:700; padding:7px 18px; border-radius:5px; cursor:pointer; margin-bottom:8px;">BROWSE FILE</div>
        <div style="font-size:11px; color:#a1a1aa;">Supports PNG, JPG, SVG, PDF</div>
        <div style="font-size:11px; color:#a1a1aa; margin-top:4px;">+$4 per upload</div>
      </div>
      <div style="margin-top:10px; padding:8px 10px; background:#fafafa; border-radius:6px; border:1px solid #f0f0f0;">
        <div style="font-size:10px; font-weight:600; color:#a1a1aa; text-transform:uppercase; letter-spacing:.05em; margin-bottom:4px;">Accepted formats</div>
        <div style="font-size:11.5px; color:#52525b; line-height:1.5;">AI, PSD, PDF, EPS<br>PNG, JPEG (300dpi+)</div>
      </div>
    </div>
  `;
}

const designList = [

// ─── Tool switcher ───
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + tool).classList.add('active');
  const panel = document.getElementById('tool-panel');
  const map = { swap: renderSwap, image: renderImage, designs: renderDesigns, text: renderText, layers: renderLayers, saved: renderSaved };
  panel.innerHTML = map[tool]();
}

  `;

  // Update sel rect to match design bounds
  const sel = document.getElementById('selection-group');
  sel.setAttribute('opacity', '1');
  document.getElementById('sel-rect').setAttribute('x', '42');
  document.getElementById('sel-rect').setAttribute('y', '70');
  document.getElementById('sel-rect').setAttribute('width', '76');
  document.getElementById('sel-rect').setAttribute('height', '90');
  document.getElementById('sel-size-label').textContent = '45×73mm';

  const existing = layers.findIndex(l => l.type === 'design');

  if (existing >= 0) layers[existing] = layerData; else layers.unshift(layerData);

  updateUndoRedo(true);
}

// ─── Text ───
function addTextLayer() {
  const g = document.getElementById('canvas-design');
  const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', '80');
  t.setAttribute('y', '220');
  t.setAttribute('text-anchor', 'middle');
  t.setAttribute('font-family', 'Inter,sans-serif');
  t.setAttribute('font-size', '11');
  t.setAttribute('fill', textColor);
  t.textContent = 'Your Text Here';
  g.appendChild(t);

  const sel = document.getElementById('selection-group');
  sel.setAttribute('opacity', '1');
  document.getElementById('sel-rect').setAttribute('x', '30');
  document.getElementById('sel-rect').setAttribute('y', '208');
  document.getElementById('sel-rect').setAttribute('width', '100');
  document.getElementById('sel-rect').setAttribute('height', '20');
  document.getElementById('sel-size-label').textContent = '100×12mm';

  layers.unshift({ name: 'Text Layer', type: 'text', color: textColor, visible: true });
  updateUndoRedo(true);
  setTool('layers');
}

function applyTextColor(hex) {
  textColor = hex;
  const dot = document.getElementById('text-color-dot');
  const swatch = document.getElementById('text-color-swatch');
  const hexInput = document.getElementById('text-hex');
  if (dot) dot.style.background = hex;
  if (swatch) swatch.style.background = hex;
  if (hexInput) hexInput.value = hex;
  document.querySelectorAll('.swatch').forEach(s => {
    s.classList.toggle('selected', s.style.background === hex || s.getAttribute('onclick') === `applyTextColor('${hex}')`);
  });
}

function switchTextTab(btn, tab) {
  document.querySelectorAll('.panel-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ─── Layers ───
function selectLayerItem(i) {
  selectedLayer = i;
  setTool('layers');
}

function toggleLayerVisibility(e, i) {
  e.stopPropagation();
  layers[i].visible = !layers[i].visible;
  setTool('layers');
}

function deleteLayer(e, i) {
  e.stopPropagation();
  layers.splice(i, 1);
  if (layers.length === 0) {
    document.getElementById('canvas-design').innerHTML = '';
    document.getElementById('selection-group').setAttribute('opacity', '0');
    currentDesign = null;
  }
  selectedLayer = -1;
  setTool('layers');
  updateUndoRedo(true);
}

// ─── Products ───
function selectProduct(el, index) {
  document.querySelectorAll('.product-card').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

// ─── Upload simulation ───

  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');

// ─── Ruler ───
function toggleRuler() {
  rulerVisible = !rulerVisible;
  const rh = document.getElementById('ruler-h');
  const rv = document.getElementById('ruler-v');
  const btn = document.getElementById('btn-ruler');
  rh.style.display = rulerVisible ? 'block' : 'none';
  rv.style.display = rulerVisible ? 'block' : 'none';
  if (btn) btn.style.background = rulerVisible ? 'rgba(255,255,255,0.15)' : 'none';
  if (rulerVisible) drawRulers();
}

function drawRulers() {
  const hg = document.getElementById('ruler-h-ticks');
  const vg = document.getElementById('ruler-v-ticks');
  if (!hg || !vg) return;
  let h = '', v = '';
  for (let i = 0; i <= 800; i += 50) {
    h += `<line x1="${i}" y1="12" x2="${i}" y2="20" stroke="#c4c4c4" stroke-width="1"/>`;
    if (i > 0) h += `<text x="${i + 2}" y="10">${i}</text>`;
    if (i <= 600) {
      v += `<line x1="12" y1="${i}" x2="20" y2="${i}" stroke="#c4c4c4" stroke-width="1"/>`;
      if (i > 0) v += `<text x="1" y="${i - 2}" transform="rotate(-90,1,${i - 2})">${i}</text>`;
    }
  }
  hg.innerHTML = h;
  vg.innerHTML = v;
}

// ─── Canvas click ───
function canvasClick(e) {
  if (layers.length > 0 && currentTool !== 'swap') {
    document.getElementById('selection-group').setAttribute('opacity', '1');
  }
}

// ─── Done ───
function handleDone() {
  if (confirm('Add this customized product to your cart?')) {
    window.location.href = 'cart.html';
  }
}

// ─── Undo/Redo state ───
function updateUndoRedo(hasHistory) {
  const undo = document.getElementById('btn-undo');
  const redo = document.getElementById('btn-redo');
  if (undo) undo.disabled = !hasHistory;
}

// ─── Price update ───
function updatePrice() {
  const base = 30;
  const extra = layers.filter(l => l.type === 'image').length * 4;
  document.getElementById('price-label').textContent = `$${(base + extra).toFixed(2)}`;
}

// ─── Init ───
setTool('swap');
</script>
</body>
</html>
