# Supabase CLI config for controlp.io
# Project ref: kwyzxqlbwraiqftfjgjj
# Dashboard: https://supabase.com/dashboard/project/kwyzxqlbwraiqftfjgjj

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://my.controlp.io"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[storage]
enabled = true

[[storage.buckets]]
name = "artwork"
public = false

[[storage.buckets]]
name = "proofs"
public = false

[[storage.buckets]]
name = "templates"
public = true
